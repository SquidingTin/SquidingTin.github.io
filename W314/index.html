<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="icon" href="icons/favicon.ico" sizes="any">
		<title>Windows 3.14</title>

		<link rel="stylesheet" href="style.css" />
	</head>

	<body>

	<div class="desktop">

		<div id="windowLayer">
		
			<div class="fake-dialog">

				<div class="fake-dialog-titlebar">
					<span class="title-text">Transferring Files</span>

					<div class="window-controls">
						<button type="button" class="win-btn minimize">_</button>
						<button type="button" class="win-btn maximize">□</button>
						<button type="button" class="win-btn close">×</button>
					</div>
				</div>

				<div class="fake-dialog-body">
					<div class="fake-dialog-text"></div>

					<div class="progress-wrap">
						<div class="progress-bar">
							<div class="progress-fill"></div>
						</div>
					</div>

					<div class="progress-info">
						<span class="progress-percent"></span>

						<span class="countdown"
							data-start="1778929800"
							data-target="1780185600">
						</span>
					</div>
				</div>

			</div>
		</div>
	</div>

	<div class="taskbar">

		<div class="start-button" id="startButton">
			Start
		</div>

		<div class="task-buttons">
			<div class="task-button">
				Transferring Files
			</div>
		</div>
		<div class="task-buttons">
			<div class="task-button">
				Transferring Files
			</div>
		</div>

		<div class="clock" id="clock">
			12:00 PM
		</div>

	</div>

	<div class="start-menu" id="startMenu">


		<div class="start-menu-content" id="startMenuContent">
		</div>

	</div>

	<script src="script.js"></script>

	</body>
</html>
